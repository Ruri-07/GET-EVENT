services:
  mysql:
    image: mysql:8.0
    container_name: getevents_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: mysql123
      MYSQL_DATABASE: getevents_db
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/scripts/init-mysql.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pmysql123"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: getevents_backend
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DB_MODE: "mysql"
      DB_URL: "jdbc:mysql://mysql:3306/getevents_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
      DB_USER: "root"
      DB_PASSWORD: "mysql123"
      JWT_SECRET: "votre_secret_tres_long_et_securise_pour_get_events"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy

  backend2:
    build:
      context: ../Application 2
      dockerfile: backend/Dockerfile
    container_name: getticket_backend
    restart: on-failure
    ports:
      - "8081:8081"
    environment:
      PORT: "8081"
      DB_MODE: "mysql"
      DB_URL: "jdbc:mysql://mysql:3306/getevents_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
      DB_USER: "root"
      DB_PASSWORD: "mysql123"
      JWT_SECRET: "votre_secret_tres_long_et_securise_pour_get_events"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
  uploads_data: